name: Deploy to Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        run: |
          npm ci
          npm run build  # Assumes package.json has "build": "tsc" or similar
      - name: Deploy with rsync over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rsync -avz --delete ./ ${{ secrets.WEBROOT_PATH }}/
            cd ${{ secrets.WEBROOT_PATH }}
            npm ci --production  # Install prod deps on server
            pm2 restart zon-terras || pm2 start dist/app.js --name zon-terras  # Adjust entry
